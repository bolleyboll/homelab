---
logLevel: debug

deploymentStrategy:
  type: RollingUpdate

serviceMonitor:
  enabled: true

sources:
  - service
  - ingress

policy: upsert-only

provider:
  name: rfc2136

extraArgs:
  - '--rfc2136-host=192.168.2.100'
  - '--rfc2136-port=53'
  - '--rfc2136-zone=lan'
  - '--rfc2136-min-ttl=0s'
  - '--rfc2136-tsig-axfr'
  - '--rfc2136-tsig-secret-alg=hmac-sha256'
  - '--rfc2136-tsig-keyname=rfc2136_tsig_secret'
  - '--rfc2136-tsig-secret=I13edEEt7kbt5GnlPvKsUpG1NayEGgWlI7XrMaYN9/I='